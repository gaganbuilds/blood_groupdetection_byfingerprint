<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fingerprint Blood Group Detector</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="text-center mb-4">
      <h1>🩸 Fingerprint Blood Group Detector</h1>
      <p class="text-muted">Upload a fingerprint image to detect the blood group</p>
    </div>

    <form method="POST" enctype="multipart/form-data" class="card p-4 shadow">
      <div class="mb-3">
        <input class="form-control" type="file" name="file" accept="image/*" required>
      </div>
      <button class="btn btn-primary w-100" type="submit">Predict Blood Group</button>
    </form>

    {% if prediction %}
      <div class="alert alert-success mt-4 text-center">
        <h4>Predicted Blood Group:</h4>
        <h2>{{ prediction }}</h2>
      </div>
    {% endif %}

    {% if message %}
      <div class="alert alert-danger mt-4 text-center">
        <strong>{{ message }}</strong>
      </div>
    {% endif %}

    {% if img_data %}
      <div class="text-center mt-3">
        <img src="data:image/jpeg;base64,{{ img_data }}" class="img-fluid rounded shadow-sm" style="max-height: 300px;">
      </div>
    {% endif %}
  </div>
</body>
</html>
